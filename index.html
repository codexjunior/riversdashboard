<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Dashboard — Rivers Dental Clinic</title>
<link rel="icon" type="image/png" href="https://afridoctor.com/cdn/storage/userFiles/BStstTNLapGT8haog/original/BStstTNLapGT8haog.png">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#0A3A63;--teal:#00A9A5;--teal-light:#E6F7F7;
  --white:#fff;--light:#F2F6F9;--border:#D8E8F0;
  --text:#1A2B3C;--muted:#6B7A8D;--red:#b91c1c}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,var(--blue) 0%,#0d5295 100%)}
.login-card{background:white;border-radius:24px;padding:3rem 2.5rem;max-width:420px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,0.25)}
.login-logo{display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem}
.login-logo img{width:48px;height:48px;object-fit:contain;border-radius:50%}
.login-logo-name{ font-size:1rem;font-weight:700;color:var(--blue)}
.login-logo-sub{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);font-weight:500;display:block}
.login-card h1{ font-size:1.5rem;color:var(--blue);margin-bottom:0.5rem}
.login-card p{font-size:0.85rem;color:var(--muted);margin-bottom:2rem}
.login-field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.25rem}
.login-field label{font-size:0.7rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.login-field input{padding:0.8rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:0.9rem;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
.login-field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,169,165,0.1)}
.login-btn{width:100%;padding:0.9rem;background:var(--teal);color:white;border:none;border-radius:100px;font-size:0.9rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:background 0.2s}
.login-btn:hover{background:var(--blue)}
.login-error{background:#fff2f2;border:1px solid #f5a0a0;color:var(--red);padding:0.75rem 1rem;border-radius:10px;font-size:0.83rem;margin-bottom:1rem;display:none}

/* ── DASHBOARD ── */
.dashboard{display:none}

.dash-header{background:var(--blue);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.dash-brand{display:flex;align-items:center;gap:0.75rem}
.dash-brand img{width:36px;height:36px;object-fit:contain;border-radius:50%}
.dash-brand-name{ font-size:0.95rem;font-weight:700;color:white}
.dash-brand-sub{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);display:block}
.dash-right{display:flex;align-items:center;gap:1rem}
.logout-btn{font-size:0.75rem;color:rgba(255,255,255,0.6);background:none;border:1px solid rgba(255,255,255,0.2);padding:0.3rem 0.75rem;border-radius:100px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
.logout-btn:hover{color:white;border-color:rgba(255,255,255,0.5)}

/* Stats */
.stats-bar{background:white;border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;gap:2rem;align-items:center;flex-wrap:wrap}
.stat{display:flex;flex-direction:column}
.stat-val{font-size:1.4rem;font-weight:700;color:var(--blue); line-height:1}
.stat-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.2rem}
.stats-divider{width:1px;height:36px;background:var(--border)}

/* Controls */
.controls{padding:1rem 2rem;display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;background:white;border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:0.65rem 1rem 0.65rem 2.25rem;border:1.5px solid var(--border);border-radius:10px;font-size:0.85rem;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--teal)}
.refresh-btn{padding:0.65rem 1.25rem;background:var(--teal);color:white;border:none;border-radius:10px;font-size:0.83rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background 0.2s}
.refresh-btn:hover{background:var(--blue)}
.result-count{font-size:0.78rem;color:var(--muted)}

/* Content */
.dash-content{padding:2rem;max-width:900px;margin:0 auto}

/* State messages */
.state-msg{text-align:center;padding:4rem 2rem;color:var(--muted)}
.state-msg .icon{font-size:2.5rem;margin-bottom:1rem}
.state-msg p{font-size:0.92rem}


/* Appointment card */
.appt-list{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:0.5rem}
.appt-card{background:white;border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;transition:box-shadow 0.2s,border-color 0.2s;cursor:default}
.appt-card:hover{box-shadow:0 4px 20px rgba(10,58,99,0.08);border-color:#b0cfe0}
.appt-card.today-card{border-left:3px solid var(--teal)}

.appt-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:0.5rem}
.appt-title{font-size:1rem;font-weight:700;color:var(--blue);line-height:1.3}
.appt-time{display:inline-flex;align-items:center;gap:0.3rem;background:var(--blue);color:white;padding:0.3rem 0.8rem;border-radius:100px;font-size:0.75rem;font-weight:600;white-space:nowrap;flex-shrink:0}
.appt-time.today-time{background:var(--teal)}
.appt-notes{font-size:0.82rem;color:var(--muted);line-height:1.65;margin-top:0.4rem;padding-top:0.6rem;border-top:1px solid var(--border);white-space:pre-wrap}
.appt-no-notes{font-size:0.78rem;color:#b0bec8;font-style:italic;margin-top:0.4rem}

/* Source badge */
.source-badge{display:inline-block;font-size:0.65rem;font-weight:600;padding:0.15rem 0.5rem;border-radius:100px;margin-top:0.25rem}
.source-badge.web{background:#e6f7f7;color:var(--teal)}
.source-badge.manual{background:#f2f6f9;color:var(--muted)}

/* Structured details (website bookings) */
.appt-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.75rem;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)}
.appt-detail{display:flex;flex-direction:column;gap:0.2rem}
.detail-label{font-size:0.62rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.detail-value{font-size:0.85rem;color:var(--text);font-weight:500}
.detail-value a{color:var(--teal);text-decoration:none}
.detail-value a:hover{text-decoration:underline}
.detail-value.service-badge{display:inline-block;background:var(--teal-light);color:var(--teal);padding:0.2rem 0.6rem;border-radius:100px;font-size:0.75rem;font-weight:600}

@media(max-width:600px){
  .dash-content{padding:1rem}
  .appt-top{flex-direction:column;gap:0.5rem}
  .stats-bar{gap:1rem}
}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:0.4rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.page-btn{padding:0.5rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;background:white;color:var(--text);font-size:0.82rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;font-weight:500}
.page-btn:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
.page-btn.active{background:var(--blue);border-color:var(--blue);color:white;font-weight:700}
.page-btn:disabled{opacity:0.35;cursor:not-allowed}
.page-ellipsis{color:var(--muted);font-size:0.82rem;padding:0 0.2rem}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://afridoctor.com/cdn/storage/userFiles/BStstTNLapGT8haog/original/BStstTNLapGT8haog.png" alt="Rivers Dental">
      <div>
        <div class="login-logo-name">Rivers Dental Clinic</div>
        <span class="login-logo-sub">Staff Portal</span>
      </div>
    </div>
    <h1>Staff Dashboard</h1>
    <p>Enter the dashboard password to view appointments.</p>
    <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter dashboard password">
    </div>
    <button class="login-btn" id="loginBtn">Access Dashboard</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="dash-header">
    <div class="dash-brand">
      <img src="https://afridoctor.com/cdn/storage/userFiles/BStstTNLapGT8haog/original/BStstTNLapGT8haog.png" alt="Rivers Dental">
      <div>
        <div class="dash-brand-name">Rivers Dental Clinic</div>
        <span class="dash-brand-sub">Staff Dashboard</span>
      </div>
    </div>
    <div class="dash-right">
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-val" id="statTotal">—</span>
      <span class="stat-label">Upcoming</span>
    </div>
    <div class="stats-divider"></div>
    <div class="stat">
      <span class="stat-val" id="statToday">—</span>
      <span class="stat-label">Today</span>
    </div>
    <div class="stats-divider"></div>
    <div class="stat">
      <span class="stat-val" id="statWeek">—</span>
      <span class="stat-label">This Week</span>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search by patient name…">
    </div>
    <span class="result-count" id="resultCount"></span>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </div>

  <div class="dash-content" id="dashContent">
    <div class="state-msg">
      <div class="icon">📅</div>
      <p>Loading appointments…</p>
    </div>
  </div>

</div>

<script>
  const API_TOKEN = "rivers-dental-staff-rct";
  const API_BASE  = "";
  const PAGE_SIZE = 10;

  let allAppointments = [];
  let currentPassword = "";
  let currentPage = 1;

  // ── Login ──────────────────────────────────────────────────────────────────
  // Auto-login if password was saved
  const savedPassword = localStorage.getItem("rdDashPassword");
  if (savedPassword) {
    document.getElementById("passwordInput").value = savedPassword;
    attemptLogin();
  }
  document.getElementById("loginBtn").addEventListener("click", attemptLogin);
  document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") attemptLogin();
  });

  async function attemptLogin() {
    const password = document.getElementById("passwordInput").value.trim();
    if (!password) return;
    document.getElementById("loginBtn").textContent = "Checking…";
    document.getElementById("loginError").style.display = "none";

    try {
      const res = await fetch(`${API_BASE}/api/appointments?token=${API_TOKEN}&password=${encodeURIComponent(password)}`);
    if (res.ok) {
        currentPassword = password;
        localStorage.setItem("rdDashPassword", password);
        const data = await res.json();
        allAppointments = data.appointments;
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        renderAll();
      } else {
        document.getElementById("loginError").style.display = "block";
        document.getElementById("loginBtn").textContent = "Access Dashboard";
      }
    } catch {
      document.getElementById("loginError").textContent = "Could not connect. Please try again.";
      document.getElementById("loginError").style.display = "block";
      document.getElementById("loginBtn").textContent = "Access Dashboard";
    }
  }

  // ── Logout ─────────────────────────────────────────────────────────────────
  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("rdDashPassword");
    currentPassword = "";
    allAppointments = [];
    document.getElementById("passwordInput").value = "";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("loginScreen").style.display = "flex";
  });

  // ── Refresh ────────────────────────────────────────────────────────────────
  document.getElementById("refreshBtn").addEventListener("click", async () => {
    document.getElementById("refreshBtn").textContent = "↻ Loading…";
    try {
      const res = await fetch(`${API_BASE}/api/appointments?token=${API_TOKEN}&password=${encodeURIComponent(currentPassword)}`);
      const data = await res.json();
      allAppointments = data.appointments;
      renderAll();
    } catch {}
    document.getElementById("refreshBtn").textContent = "↻ Refresh";
  });

  // ── Search ─────────────────────────────────────────────────────────────────
  document.getElementById("searchInput").addEventListener("input", () => { currentPage = 1; renderAll(); });

  // ── Helpers ────────────────────────────────────────────────────────────────
  function getAccraToday() {
    return new Date().toLocaleDateString("en-CA", { timeZone: "Africa/Accra" });
  }

  function getBucket(dateRaw) {
    const todayStr = getAccraToday();
    const d = new Date(dateRaw);
    const dStr = d.toLocaleDateString("en-CA", { timeZone: "Africa/Accra" });

    if (dStr === todayStr) return "today";

    const today = new Date(todayStr + "T00:00:00");
    const diffDays = Math.floor((d - today) / (1000 * 60 * 60 * 24));

    if (diffDays <= 7)  return "week";
    if (diffDays <= 31) return "month";
    return "later";
  }


  // ── Render ─────────────────────────────────────────────────────────────────
  function renderAll() {
    const search = document.getElementById("searchInput").value.toLowerCase().trim();

    const filtered = search
      ? allAppointments.filter(a => a.title.toLowerCase().includes(search))
      : allAppointments;

    // Stats always based on all appointments
    const todayStr = getAccraToday();
    const weekEnd = new Date(new Date(todayStr + "T00:00:00").getTime() + 7 * 86400000);
    document.getElementById("statTotal").textContent = allAppointments.length;
    document.getElementById("statToday").textContent = allAppointments.filter(a => a.dateRaw.startsWith(todayStr)).length;
    document.getElementById("statWeek").textContent  = allAppointments.filter(a => new Date(a.dateRaw) <= weekEnd).length;

    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = 1;

    const start = (currentPage - 1) * PAGE_SIZE;
    const paginated = filtered.slice(start, start + PAGE_SIZE);

    document.getElementById("resultCount").textContent = search
      ? `${filtered.length} result${filtered.length !== 1 ? "s" : ""}`
      : `${filtered.length} appointment${filtered.length !== 1 ? "s" : ""}`;

    if (filtered.length === 0) {
      document.getElementById("dashContent").innerHTML = `<div class="state-msg"><div class="icon">🦷</div><p>${search ? "No appointments match your search." : "No upcoming appointments."}</p></div>`;
      return;
    }

    // Group paginated results into buckets
    const buckets = { today: [], week: [], month: [], later: [] };
    paginated.forEach(a => buckets[getBucket(a.dateRaw)].push(a));

    let html = "";
    ["today", "week", "month", "later"].forEach(bucketKey => {
      const appts = buckets[bucketKey];
      if (appts.length === 0) return;

      const byDate = {};
      appts.forEach(a => {
        const key = a.dateRaw.split("T")[0];
        if (!byDate[key]) byDate[key] = [];
        byDate[key].push(a);
      });

      Object.entries(byDate).forEach(([, dayAppts]) => {
        const isToday = bucketKey === "today";
        if (bucketKey !== "today") {
          html += `<div style="font-size:0.75rem;font-weight:600;color:var(--muted);margin:0.75rem 0 0.4rem;text-transform:uppercase;letter-spacing:0.08em">${dayAppts[0].date}</div>`;
        }

        html += `<div class="appt-list">`;
        dayAppts.forEach(a => {
          const timeRange = a.timeEnd && a.timeEnd !== a.time
            ? `${a.time} – ${a.timeEnd}`
            : a.time;

          const details = a.isWebBooking ? `
            <div class="appt-details">
              <div class="appt-detail">
                <span class="detail-label">Patient</span>
                <span class="detail-value">${a.patient}</span>
              </div>
              <div class="appt-detail">
                <span class="detail-label">Phone</span>
                <span class="detail-value"><a href="tel:${(a.phone||'').replace(/\s/g,'')}">${a.phone}</a></span>
              </div>
              <div class="appt-detail">
                <span class="detail-label">Email</span>
                <span class="detail-value"><a href="mailto:${a.email}">${a.email}</a></span>
              </div>
              <div class="appt-detail">
                <span class="detail-label">Service</span>
                <span class="detail-value service-badge">${a.service}</span>
              </div>
            </div>` : `
            ${a.notes
              ? `<div class="appt-notes">${a.notes}</div>`
              : `<div class="appt-no-notes">No notes</div>`}`;

          const source = a.isWebBooking
            ? `<span class="source-badge web">🌐 Website</span>`
            : `<span class="source-badge manual">📝 Manual</span>`;

          html += `<div class="appt-card${isToday ? " today-card" : ""}">
            <div class="appt-top">
              <div>
                <div class="appt-title">${a.title}</div>
                ${source}
              </div>
              <span class="appt-time${isToday ? " today-time" : ""}">🕐 ${timeRange}</span>
            </div>
            ${details}
          </div>`;
        });
        html += `</div>`;
      });
    });

    // Pagination controls
    if (totalPages > 1) {
      html += `<div class="pagination">`;
      html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>← Prev</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
          html += `<button class="page-btn${i === currentPage ? " active" : ""}" onclick="changePage(${i})">${i}</button>`;
        } else if (Math.abs(i - currentPage) === 2) {
          html += `<span class="page-ellipsis">…</span>`;
        }
      }
      html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Next →</button>`;
      html += `</div>`;
    }

    document.getElementById("dashContent").innerHTML = html;
  }

  function changePage(page) {
    const search = document.getElementById("searchInput").value.toLowerCase().trim();
    const filtered = search
      ? allAppointments.filter(a => a.title.toLowerCase().includes(search))
      : allAppointments;
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderAll();
    document.getElementById("dashContent").scrollIntoView({ behavior: "smooth", block: "start" });
  }
</script>
</body>
</html>
